<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        width: 85%;
        margin: 0 auto;
    }
    * {
        box-sizing: border-box;
    }
    .header {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    h2 {
        font-size: 28px;
    }
    .searchInput {
        display: flex;
        justify-content: center;
    }
    #searchInput {
        margin: 20px 0;
        padding: 20px 30px;
        width: 400px;
        border-radius: 30px;
        border: 3px solid rgb(66, 60, 60);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }
    input::placeholder {
        font-size: 16px;
    }
    .pokemon_list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    }

    .pokemon_item {
        background-color: white;
        border: 2px solid rgb(241, 245, 249);
        border-radius: 24px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        width: 200px;
        transition: box-shadow 0.2s ease;
        cursor: pointer;
    }
    .pokemon_item:hover {
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }
    .id {
        color: black;
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 15px;
    }

    .image img {
        width: 180px;
        height: 150px;
        object-fit: cover;
    }

    .name p {
        font-size: 20px;
        font-weight: bold;
        color: rgb(15, 23, 42);
        margin: 15px 0;
        text-transform: capitalize;
    }

    .type_list {
        display: flex;
        gap: 8px;
        justify-content: center;
        width: 100%;
        font-weight: bold;
    }

    .type {
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 14px;
        color: black;
        text-transform: capitalize;
    }

    .grass {
        background-color: rgb(122, 199, 76);
    }
    .poison {
        background-color: rgb(163, 62, 161);
    }
    .fire {
        background-color: rgb(255, 66, 66); 
    }
    .water {
        background-color: rgb(99, 144, 240);
    }
    .bug {
        background-color: rgb(166, 185, 26);
    }
    .normal {
        background-color: rgb(168, 167, 122);
    }
    .electric {
        background-color: rgb(247, 208, 44);
    }
    .flying {
        background-color: rgb(169, 143, 243);
    }
</style>
<body>
    <div class="header">
        <h2>POKEMON API</h2>
    </div>
    <div class="search">
        <div class="searchInput">
            <input type="text" id="searchInput" placeholder="Nhập tên Pokemon vào">
        </div>
        <div class="pokemon_list">
            <div class="pokemon_item">
                <div class="id">#1</div>
                <div class="image">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" alt="bulbasaur">
                </div>
                <div class="name">
                    <p>bulbasaur</p>
                </div>
                <div class="type_list">
                    <div class="type grass">grass</div>
                    <div class="type poison">poison</div>
                </div>
            </div>
        </div>
    </div>
    <script src="style11.js"></script>
</body>
</html>
