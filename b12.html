<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="css/animate.css">
    <script src="wow.min.js">
    </script>
    <script>
    wow = new WOW(

        boxClass:     'wow',      // default
        animateClass: 'animated', // default

        mobile:       true,       // default
        live:         true        // default
    }
    )
    wow.init();
    </script>
    <link rel="stylesheet" type="text/css" href="./slick-1.8.1/slick/slick.css"/>

        .slide {
            width: 300px;

</head>
