<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1, .box2 {
            width: 100px;
            height: 100px;
            background-color: orange;
            margin: 10px;
        }
        .static {
            position: static;
        }
        .relative {
            position: relative;
        }
        /* Phần nút: Animation
        vd: button:hover
        hover: khi rơ chuột vào sẽ hiện CSS mik thấy
        focus: nhấn chọn
        active: khi nhấn giữ chuột;
        Scale:
        transform: scale(1.5)
        transform: translateX(100px)/rotate(45deg)
        transition: background-color 1s linear-hiện mờ dần/ease-nhanh dần (viết trên nút) */
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">Box 1</div>
        <div class="box2">Box 2</div>
    </div>
</body>
</html>
