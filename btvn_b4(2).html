<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #2f3238;
            margin: 100px;
        }
        .button-section {
            display: flex;
            justify-content: center;
        }
        .button-section a {
            height: 60px;
            width: 80px;
            background-color:#2f3238;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 6px;
            font-size: 18px;
            font-weight: bold;
            color: rgba(7, 7, 190, 0.893);
            text-decoration: none;
            
        }
        a:hover {
            background-color: grey;
            color: white;
        }
        .Julia-section > h2 {
            color: grey;
            font-size: 30px;
        }
        .Julia-image {
            display: flex;
            justify-content: center;
        }
        .effect-Julia {
            margin: 0 5px;
            position: relative;
            overflow: hidden;
        }
        .image {
            display: block;
            width: calc(100% + 50px);
            gap: 15px;
            max-width: 400px;
            max-width: none;
            transform: translateX(-30px);
            transition: transform 1s ease;
        }
        .content {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: start;
            align-items: start;
            padding: 25px;
            color: white;
            /* text-transform: uppercase; */
            transition: 0.5s;
            background-color: rgba(33, 34, 35, 0.2);
            transition: background-color 0.2s ease;
        }
        .content h2 {
            font-weight: lighter;
            font-size: 35px;
        }
        h2 span {
            font-weight: bold;
        }
        .content p {
            opacity: 0;
            height: 40px;
            width: 220px;
            display: inline-block;
            padding: 0 5px;
            line-height: 40px;
            color: black;
            background-color: white;
            font-size: 16px;
            transform: translateX(-30px);
            transition: opacity 0.5s ease;
            margin: 3px 0;
            transition: all 0.5s ease;
            transition-delay: 0s;
        }
        .effect-Julia:hover p {
            opacity: 1;
            transform: translateX(0px);
            transition-delay: calc(0.1s * var(--i));
        }
        .content:hover {
            background-color: rgba(19, 19, 19, 0.4);
        }
        .effect-Julia:hover .image {
            transform: scale(1.15);
        }
    </style>
</head>
<body>
    <div class="button-section">
        <a href="https://didieu0807.github.io/web_basic/btvn_b4(1)">SET 1</a>
        <a href="https://didieu0807.github.io/web_basic/btvn_b4(2)">SET 2</a>
    </div>
    <div class="Julia-section">
        <h2>Julia</h2>
        <div class="Julia-image">
            <div class="effect-Julia" style="width: 50%;">
                <img class="image" src="https://tympanus.net/Development/HoverEffectIdeas/img/21.jpg" alt="Julia-image">
                <div class="content">
                    <h2>PASSIONATE <span> JULIA</span></h2>
                    <p style="--i: 1">Julia dances in the deep dark</p>
                    <p style="--i: 2">She loves the smell of the ocean</p>
                    <p style="--i: 3">And dives into the morning light</p>
                </div>
            </div>
            <div class="effect-Julia" style="width: 50%;">
                <img class="image" src="https://tympanus.net/Development/HoverEffectIdeas/img/22.jpg" alt="Julia-image">
                <div class="content">
                    <h2>PASSIONATE <span> JULIA</span></h2>
                    <p style="--i: 1">Julia dances in the deep dark</p>
                    <p style="--i: 2">She loves the smell of the ocean</p>
                    <p style="--i: 3">And dives into the morning light</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
