<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            justify-content: /*end/start/center/space-between/*/space-around;
            align-items: bottom;
            background-color: black;
            box-shadow: 0 0 10px red;
        }
        .box {
            margin: 10px;
            width: 10px;
            height: 30px;
            background-color: red;
        }
        .red {
            background-color: red;
        }
        .blue {
            background-color: blue;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box red"></div>
        <div class="box blue"></div>
        <div class="box"></div>
    </div>
</body>
</html>
