        /* .parent p => thẻ con p của .parent
        .parent > p => thẻ con trực tiếp của .parent */
        /* .parent + p {
            color: green;
        } */
        /* .parent ~ p => tất cả thẻ p phía sau .parent */
        .box1 {
            width: 250px;
            height: 250px;
            border: 5px solid black;
            margin: 10px;
        }
        .image {
            width: 100%;
            height: 100%;
        }
        .fill {
            object-fit: fill; /*=> lấp đầy, có thể méo */
        }
        .contain {
            object-fit: contain;
        }
        .cover {
            object-fit: cover;
        }
        /*box sizing */
        /* content box: là width + 2padding + 2border
        border box: là width - 2padding - 2border => thường sài để ko bị bể form */
        .box {
            width: 200px;
            height: 200px;
            box-sizing: border-box;
            padding: 20px;
            border: 5px solid black;
            color: blue;
            box-shadow: 10px 0px 100px black;
            background-image: url("profile-image.jpg");
            background-size: cover;
            background-repeat: repeat;
            background-position: /*center*/ left top;
        }
    </style>
</head>
