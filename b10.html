<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            color: red;
        }
        .blue {
            color: blue;
        }
        button {
            color: black;
            background-color: yellow;
        }
        .dark {
            color: white;
            background-color: black;
        }
    </style>
</head>
<body>
    <div>thẻ 1</div>
    <div>thẻ 2</div>
    <div>thẻ 3</div>
    <button>click me</button>

    <script>
        const divs = document.querySelectorAll("div");
        let button = document.querySelector("button");
        button.addEventListener("click", function(){
            document.body.classList.toggle("dark");
        })
        // divs.forEach(
        //     function(div) {
        //         div.addEventListener("click", function(){
        //             div.classList.add("blue"); //thêm class blue vào thẻ div
        //         });
        //         div.addEventListener("click", function(){
        //             div.classList.remove("blue"); //loại bỏ class blue vào thẻ div
        //         });
        //         //div.classList.toggle("blue"); //chuyển đổi - có class thì bỏ mà ko có thì thêm vào
        //     }

        // );
        divs.forEach(
            function(thediv) {
                thediv.addEventListener("click", function(){
                    divs.forEach(
                        thediv => {
                            thediv.classList.remove("blue");
                        }
                    )
                    thediv.classList.toggle("blue");
                });
                
            }
           
        );

    </script>
</body>
</html>
